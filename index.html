<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLog Memo - AzlanMymo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="p-4 font-sans pb-20">

    <header class="mb-6 text-center">
        <h1 class="text-2xl font-bold text-blue-400 uppercase tracking-wider">DevLog Notebook</h1>
        <p class="text-[10px] text-slate-400 italic">Offline Storage • Local Search • Code Ready</p>
    </header>

    <div class="glass-card p-4 rounded-xl mb-6">
        <input type="text" id="noteTitle" placeholder="Tajuk Projek / Langkah..." 
            class="w-full bg-slate-800 border-none rounded-lg p-3 mb-3 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
        
        <textarea id="noteContent" rows="5" placeholder="Tulis langkah kerja atau snippet kod di sini..." 
            class="w-full bg-slate-800 border-none rounded-lg p-3 mb-3 focus:ring-2 focus:ring-blue-500 outline-none font-mono text-xs"></textarea>
        
        <div class="flex flex-wrap gap-2">
            <button onclick="saveNote()" class="flex-1 bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition text-sm">
                Simpan Nota
            </button>
            <button onclick="exportToJSON()" class="bg-slate-700 hover:bg-slate-600 px-4 rounded-lg text-xs transition">Backup JSON</button>
        </div>
    </div>

    <div class="mb-6">
        <input type="text" id="searchInput" onkeyup="searchNotes()" placeholder="Cari tajuk atau isi nota..." 
            class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none text-blue-300">
    </div>

    <div id="notesContainer" class="space-y-4">
        </div>

    <script>
        // 1. Simpan Nota (LocalStorage)
        function saveNote() {
            const title = document.getElementById('noteTitle').value;
            const content = document.getElementById('noteContent').value;
            const date = new Date().toLocaleString('ms-MY');

            if(!title || !content) return alert("Sila isi tajuk dan kandungan!");

            const note = { title, content, date, id: Date.now() };
            let notes = JSON.parse(localStorage.getItem('devNotes') || '[]');
            notes.unshift(note);
            localStorage.setItem('devNotes', JSON.stringify(notes));

            renderNotes();
            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';
        }

        // 2. Papar Nota & Fungsi Carian
        function renderNotes() {
            const notes = JSON.parse(localStorage.getItem('devNotes') || '[]');
            displayNotes(notes);
        }

        function searchNotes() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const notes = JSON.parse(localStorage.getItem('devNotes') || '[]');
            const filtered = notes.filter(n => n.title.toLowerCase().includes(term) || n.content.toLowerCase().includes(term));
            displayNotes(filtered);
        }

        function displayNotes(notesArray) {
            const container = document.getElementById('notesContainer');
            if(notesArray.length === 0) {
                container.innerHTML = `<p class="text-center text-slate-500 text-sm italic py-10">Tiada nota ditemui.</p>`;
                return;
            }

            container.innerHTML = notesArray.map(n => `
                <div class="glass-card p-4 rounded-xl relative animate-fade-in text-sm border-l-4 border-blue-500">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <h3 class="font-bold text-blue-300 pr-10">${n.title}</h3>
                            <p class="text-[9px] text-slate-500 italic">${n.date}</p>
                        </div>
                        <button onclick="deleteNote(${n.id})" class="text-red-500/50 hover:text-red-400 text-[10px]">Padam</button>
                    </div>
                    <div class="relative group">
                        <pre id="code-${n.id}" class="bg-black/40 p-3 rounded text-[11px] overflow-x-auto font-mono text-green-400 border border-white/5 whitespace-pre-wrap">${n.content}</pre>
                        <button onclick="copyCode(${n.id})" class="absolute top-2 right-2 bg-slate-700/80 hover:bg-blue-600 text-[9px] px-2 py-1 rounded text-white transition">Copy</button>
                    </div>
                </div>
            `).join('');
        }

        // 3. Fungsi Copy (Penting untuk Developer Mobile)
        function copyCode(id) {
            const codeText = document.getElementById(`code-${id}`).innerText;
            navigator.clipboard.writeText(codeText).then(() => {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = "Copied!";
                btn.classList.add("bg-green-600");
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.remove("bg-green-600");
                }, 1500);
            });
        }

        // 4. Padam & Export
        function deleteNote(id) {
            if(!confirm("Padam nota?")) return;
            let notes = JSON.parse(localStorage.getItem('devNotes') || '[]');
            notes = notes.filter(n => n.id !== id);
            localStorage.setItem('devNotes', JSON.stringify(notes));
            renderNotes();
        }

        function exportToJSON() {
            const notes = localStorage.getItem('devNotes');
            if(!notes) return alert("Tiada data.");
            const blob = new Blob([notes], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `DevLog_Backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        renderNotes();
    </script>
</body>
</html>
